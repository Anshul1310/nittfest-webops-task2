services:
  user-service:
    build:
      context: ./backend/user-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  order-service:
    build:
      context: ./backend/order-service
    ports:
      - "8082:8082"
    environment:
      - USER_SERVICE_URL=${USER_SERVICE_URL}
    depends_on:
      user-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_USER_SERVICE_URL=${VITE_USER_SERVICE_URL}
      - VITE_ORDER_SERVICE_URL=${VITE_ORDER_SERVICE_URL}
    depends_on:
      - user-service
      - order-service